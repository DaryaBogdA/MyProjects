<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки тренера</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<section class="coaches-section">
    <div class="container">
        <div class="coaches-header">
            <h1 class="coaches-title"><i class="fas fa-note-sticky me-2"></i>Заметки по игрокам</h1>
            <p class="coaches-subtitle">Личные заметки тренера о прогрессе друзей-игроков</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="info-card mb-4">
            <form th:action="@{/coach/notes/save}" method="post">
                <div class="row g-2">
                    <div class="col-md-4">
                        <select name="playerId" class="form-select" required>
                            <option value="" selected disabled>Выберите игрока</option>
                            <option th:each="player : ${friendPlayers}" th:value="${player.id}"
                                    th:text="${player.firstName} + ' ' + ${player.lastName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" name="note" class="form-control" required
                               placeholder="Например: улучшить прием и работу на блоке">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Сохранить</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="info-card">
            <h5><i class="fas fa-clock-rotate-left me-2"></i>Последние заметки</h5>
            <div th:if="${#lists.isEmpty(notes)}" class="text-muted">
                Пока нет заметок
            </div>
            <div th:each="n : ${notes}" class="border-bottom py-2">
                <div class="fw-semibold" th:text="${n.player.firstName} + ' ' + ${n.player.lastName}"></div>
                <div th:text="${n.note}">Текст заметки</div>
                <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024</small>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{layout/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
