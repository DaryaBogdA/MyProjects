<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика тренера</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<section class="coaches-section">
    <div class="container">
        <div class="coaches-header">
            <h1 class="coaches-title"><i class="fas fa-chart-line me-2"></i>Аналитика тренировок</h1>
            <p class="coaches-subtitle">Ключевые метрики по вашим тренировкам</p>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="info-card text-center"><h6>Всего тренировок</h6><h3 th:text="${totalTrainings}">0</h3></div></div>
            <div class="col-md-3"><div class="info-card text-center"><h6>Предстоящие</h6><h3 th:text="${upcomingTrainings}">0</h3></div></div>
            <div class="col-md-3"><div class="info-card text-center"><h6>Всего заявок</h6><h3 th:text="${totalApplications}">0</h3></div></div>
            <div class="col-md-3"><div class="info-card text-center"><h6>Посещений</h6><h3 th:text="${attendedApplications}">0</h3></div></div>
        </div>

        <div class="info-card">
            <h5><i class="fas fa-list me-2"></i>Последние тренировки</h5>
            <div th:if="${#lists.isEmpty(trainings)}" class="text-muted">Пока нет тренировок</div>
            <div th:each="t : ${trainings}" class="border-bottom py-2 d-flex justify-content-between">
                <div>
                    <strong th:text="${t.title}">Тренировка</strong>
                    <span class="text-muted ms-2" th:text="${#temporals.format(t.dateTime, 'dd.MM.yyyy HH:mm')}">01.01.2026</span>
                </div>
                <span class="badge bg-light text-dark" th:text="${t.location != null ? t.location : 'Локация не указана'}">Зал</span>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
