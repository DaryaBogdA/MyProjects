<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - EventArena</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
            padding: 40px 20px;
        }
        .auth-container {
            background-color: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            max-width: 450px;
            width: 100%;
            padding: 30px;
        }
        .auth-container h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background-color: #f8f9fa;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.3s;
            text-align: center;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-dark);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, var(--gradient-end), var(--gradient-start));
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(65, 105, 225, 0.3);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="https://img.freepik.com/premium-vector/abstract-initial-letter-ae-ea-logo-blue-color-isolated-white-background_388320-815.jpg" alt="EventArena Logo" class="logo-img">
                    <h1 class="gradient-text">EventArena</h1>
                </div>
                <div class="nav-buttons">
                    <a href="index.html" class="btn btn-outline">На главную</a>
                </div>
            </div>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-container">
            <h2>Добро пожаловать!</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Вход</button>
                <button class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">Регистрация</button>
            </div>

            <div class="notification" id="notification" style="display: none; margin-bottom: 20px; padding: 12px; border-radius: 6px; border-left: 4px solid #ffc107; background: #fff8e1; color: #856404;">
                <span id="notificationMessage"></span>
            </div>

            <form id="loginForm" class="auth-form active" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn-submit">Войти</button>
            </form>

            <form id="registerForm" class="auth-form" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="regName" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" id="regLastName" placeholder="Введите фамилию" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn-submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>EventArena</h3>
                    <p>Ваш надежный помощник в мире спортивных событий</p>
                </div>
                <div class="footer-section">
                    <h3>Навигация</h3>
                    <ul>
                        <li><a href="index.html">Главная</a></li>
                        <li><a href="search.html">Поиск</a></li>
                        <li><a href="#">О проекте</a></li>
                        <li><a href="#">Контакты</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>Контакты</h3>
                    <ul>
                        <li>+375 (29) 123-45-67</li>
                        <li>info@eventarena.by</li>
                        <li>Минск, пр. Победителей, 20</li>
                    </ul>
                </div>
            </div>
            <div style="text-align: center; margin-top: 40px; opacity: 0.8;">
               &copy; 2026 EventArena. Все права защищены.
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script src="../static/js/auth.js"></script>
</body>
</html>
