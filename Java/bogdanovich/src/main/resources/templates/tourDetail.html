<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Тур</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="/api/assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="/api/assets/img/logo.png">
    <script src="/api/assets/js/config.js"></script>
    <script src="/api/assets/js/app.js"></script>
    <script src="/api/assets/js/js.js"></script>
    <style>
        .hero-img { width: 100%; max-height: 420px; object-fit: cover; border-radius: 24px; }
        .info-card { border: 0; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.08); padding: 1.5rem; background: #fff; }
        .list-item { border: 1px solid #eef2f6; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div id="header"></div>
<div class="container mt-4 mb-5" id="content">
    <p class="text-muted">Загрузка...</p>
</div>
<div id="footer"></div>
<script>
    const id = new URLSearchParams(location.search).get('id');
    function render(t) {
        const img = normalizeImage(t.photoUrl);
        const multiCity = (t.name || '').includes('+');
        const exTitle = multiCity ? 'Экскурсии (Париж и Ницца)' : 'Экскурсии';
        const atTitle = multiCity ? 'Достопримечательности (Париж и Ницца)' : 'Достопримечательности';
        const ex = (t.excursions || []).map(e => `
            <div class="list-item">
                <strong>${e.name}</strong>${e.cityName ? ' <span class="badge bg-light text-dark">' + e.cityName + '</span>' : ''}<br>
                <span class="text-muted small">${e.durationHours || '—'} ч. · ${e.meetingPoint || ''} · ${e.price != null ? e.price + ' €' : 'бесплатно'}</span>
            </div>`).join('') || '<p class="text-muted">Нет экскурсий</p>';
        const at = (t.attractions || []).map(a => `
            <div class="list-item d-flex gap-3 align-items-start">
                ${a.photo_url ? '<img src="'+normalizeImage(a.photo_url)+'" style="width:80px;height:60px;object-fit:cover;border-radius:8px">' : ''}
                <div><strong>${a.name}</strong><br><span class="text-muted small">${a.description || ''}</span></div>
            </div>`).join('') || '<p class="text-muted">Нет данных</p>';
        $('#content').html(`
            <a href="chooseTour.html" class="text-decoration-none"><i class="fas fa-arrow-left"></i> К списку туров</a>
            <img class="hero-img mt-3 mb-4" src="${img}" alt="${t.name}" onerror="this.src='/api/assets/img/countries/italy.jpg'">
            <div class="row g-4">
                <div class="col-lg-8">
                    <h1 class="fw-bold">${t.name}</h1>
                    <p class="text-muted">${t.countryName || ''}${t.cityName ? ' · ' + t.cityName : ''}</p>
                    <p>${t.description || ''}</p>
                    ${t.programInfo ? '<h5 class="fw-bold mt-4">Программа</h5><pre class="bg-light p-3 rounded" style="white-space:pre-wrap;font-family:inherit">' + t.programInfo + '</pre>' : ''}
                    <h5 class="fw-bold mt-4">${exTitle}</h5>${ex}
                    <h5 class="fw-bold mt-4">${atTitle}</h5>${at}
                </div>
                <div class="col-lg-4">
                    <div class="info-card sticky-top" style="top:90px">
                        <p><i class="fas fa-clock me-2"></i><strong>${t.durationDays || '—'} дней</strong></p>
                        <p class="fs-3 fw-bold text-danger">${t.priceTotal != null ? t.priceTotal + ' €' : '—'}</p>
                        <label class="form-label small text-muted mt-2">Дата начала поездки</label>
                        <input type="date" class="form-control mb-3" id="travelDate">
                        <button class="btn w-100" id="bookBtn">Забронировать тур</button>
                    </div>
                </div>
            </div>`);
        setMinDateToday('#travelDate');
        $('#bookBtn').on('click', async function () {
            if (!requireAuth()) return;
            const travelDate = $('#travelDate').val();
            if (!travelDate) { alert('Укажите дату начала поездки'); return; }
            if (travelDate < todayIso()) { alert('Нельзя бронировать тур в прошлом'); return; }
            try {
                await $.ajax({
                    url: API_BASE + '/bookings/tours/' + t.id,
                    method: 'POST',
                    contentType: 'application/json',
                    headers: authHeaders(),
                    data: JSON.stringify({ travelDate })
                });
                alert('Заявка отправлена! Статус — в «Мои бронирования».');
                location.href = 'myBookings.html';
            } catch (e) {
                alert(e.responseJSON?.message || 'Не удалось забронировать');
            }
        });
    }
    $(document).ready(function () {
        if (!id) { $('#content').html('<p class="text-danger">Тур не указан</p>'); return; }
        $.get(API_BASE + '/tours/' + id).done(render).fail(() => $('#content').html('<p class="text-danger">Тур не найден</p>'));
    });
</script>
</body>
</html>
