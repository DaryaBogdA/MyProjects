<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Страна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
    <link rel="icon" href="../static/img/logo.png">
    <script src="../static/js/js.js"></script>

</head>
<body>

<div id="header"></div>

<div id="page-content">
    <div class="loading-spinner">
        <i class="fas fa-circle-notch"></i>
        <p class="mt-3">Загружаем информацию...</p>
    </div>
</div>

<div id="footer"></div>

<script>

    function getCountryIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    function renderPage(country) {
        const heroSection = `
            <section class="country-hero">
                    <img class="country-hero-img" src="${country.path_url}" alt="${country.name}">
                <div class="country-hero-overlay">
                    <div>
                        <div class="country-hero-badge">
                            <i class="fas fa-star"></i> Популярность: ${country.popularity}
                        </div>
                        <div class="country-hero-title">${country.name}</div>
                    </div>
                </div>
            </section>
        `;

        const infoSection = `
            <section class="country-info-section">
                <div class="container">
                    <a href="countries.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Назад к странам
                    </a>
                    <br>
                    <h2 class="section-heading">О стране</h2>
                    <p class="mt-3"></p>
                    <div class="country-description-box mt-3">
                        ${country.description || 'Описание отсутствует.'}
                    </div>
                </div>
            </section>
        `;

        const citiesHtml = renderCities(country.cities);

        const citiesSection = `
            <section class="cities-section">
                <div class="container">
                    <h2 class="section-heading">Города и достопримечательности</h2>
                    <p class="text-muted mt-2 mb-4">Исследуйте лучшие места</p>
                    ${citiesHtml}
                </div>
            </section>
        `;

        document.getElementById('page-content').innerHTML = heroSection + infoSection + citiesSection;
    }

    function renderCities(cities) {
        if (!cities || cities.length === 0) {
            return `<p class="no-attractions">Города не добавлены.</p>`;
        }

        return cities.map(city => {
            const attractionsHtml = renderAttractions(city.attractions);
            return `
                <div class="city-block">
                    <div class="city-header">
                        <div class="city-icon"><i class="fas fa-city"></i></div>
                        <h3>${city.name}</h3>
                        <div class="city-popularity">
                            <i class="fas fa-fire"></i> ${city.popularity}
                        </div>
                    </div>
                    <div class="city-body">
                            <p class="city-description">${city.description}</p>
                        <div class="attractions-title">
                            <i class="fas fa-landmark"></i> Достопримечательности
                        </div>
                        ${attractionsHtml}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderAttractions(attractions) {
        if (!attractions || attractions.length === 0) {
            return `<p class="no-attractions">Достопримечательности не добавлены.</p>`;
        }

        return `<div class="attractions-grid">` + attractions.map(attr => {
            return `
                <div class="attraction-card">
                    <div class="attraction-img-wrap">
                        <img src="${attr.photo_url}" alt="${attr.name}">
                    </div>
                    <div class="attraction-body">
                        <div class="attraction-name">${attr.name}</div>
                        ${attr.description
                            ? `<div class="attraction-desc">${attr.description}</div>`
                            : ''
                        }
                        <div class="attraction-popularity">
                            <i class="fas fa-star"></i> ${attr.popularity}
                        </div>
                    </div>
                </div>
            `;
        }).join('') + `</div>`;
    }

    $(document).ready(function () {
        const countryId = getCountryIdFromUrl();

        if (!countryId) {
            document.getElementById('page-content').innerHTML = `
                <div class="error-box">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h4>Страна не найдена</h4>
                    <p>Не указан идентификатор страны.</p>
                    <a href="countries.html" class="btn mt-3"><i class="fas fa-arrow-left"></i> К списку стран</a>
                </div>`;
            return;
        }

        $.ajax({
            url: 'http://localhost:8087/api/countries/' + countryId,
            type: 'GET',
            success: function (country) {
                renderPage(country);
            },
            error: function (xhr) {
                const msg = xhr.status === 404 ? 'Страна не найдена.' : 'Ошибка загрузки данных.';
                document.getElementById('page-content').innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h4>${msg}</h4>
                        <a href="countries.html" class="btn mt-3"><i class="fas fa-arrow-left"></i> К списку стран</a>
                    </div>`;
            }
        });
    });
</script>
</body>
</html>
