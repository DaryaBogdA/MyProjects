<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Страна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
    <link rel="icon" href="../static/img/logo.png">
    <script src="../static/js/js.js"></script>
    <style>
        .country-hero {
            position: relative;
            height: 480px;
            overflow: hidden;
            margin-top: 0;
        }

        .country-hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .country-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.65) 100%);
            display: flex;
            align-items: flex-end;
            padding: 50px 60px;
        }

        .country-hero-title {
            color: #fff;
            font-size: 3.6rem;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            line-height: 1.1;
        }

        .country-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--coral);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 30px;
            margin-bottom: 14px;
        }

        .country-info-section {
            background: #fff;
            padding: 60px 0 50px;
        }

        .country-description-box {
            background: var(--light-blue);
            border-left: 5px solid var(--coral);
            border-radius: 0 16px 16px 0;
            padding: 30px 35px;
            font-size: 1.15rem;
            line-height: 1.9;
            color: var(--dark-text);
        }

        .section-heading {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 8px;
            position: relative;
            display: inline-block;
        }

        .section-heading::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--coral);
            border-radius: 4px;
            margin-top: 8px;
        }

        .cities-section {
            background: #f8f9fa;
            padding: 60px 0 80px;
        }

        .city-block {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            margin-bottom: 50px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .city-block:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.13);
        }

        .city-header {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #3d4f6e 100%);
            color: #fff;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .city-icon {
            width: 50px;
            height: 50px;
            background: var(--coral);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .city-header h3 {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0;
        }

        .city-header .city-popularity {
            margin-left: auto;
            font-size: 0.9rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .city-body {
            padding: 28px 32px 32px;
        }

        .city-description {
            font-size: 1.05rem;
            color: #555;
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .attractions-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .attractions-title i {
            color: var(--coral);
        }

        .attractions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .attraction-card {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.09);
            background: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .attraction-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .attraction-img-wrap {
            height: 170px;
            overflow: hidden;
            position: relative;
            background: #e9ecef;
        }

        .attraction-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .attraction-card:hover .attraction-img-wrap img {
            transform: scale(1.08);
        }

        .attraction-img-placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
            font-size: 2.5rem;
        }

        .attraction-body {
            padding: 16px 18px 20px;
        }

        .attraction-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 8px;
        }

        .attraction-desc {
            font-size: 0.88rem;
            color: #777;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .attraction-popularity {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.82rem;
            color: var(--coral);
            font-weight: 600;
        }

        .no-attractions {
            color: #adb5bd;
            font-style: italic;
            font-size: 0.95rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--coral);
            font-weight: 600;
            text-decoration: none;
            font-size: 1rem;
            margin-bottom: 30px;
            transition: gap 0.2s ease;
        }

        .back-btn:hover {
            gap: 14px;
            color: var(--coral);
        }

        .loading-spinner {
            text-align: center;
            padding: 100px 0;
            color: #adb5bd;
        }

        .loading-spinner i {
            font-size: 3rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-box {
            text-align: center;
            padding: 80px 20px;
            color: #dc3545;
        }

        .error-box i {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div id="header"></div>

<div id="page-content">
    <div class="loading-spinner">
        <i class="fas fa-circle-notch"></i>
        <p class="mt-3">Загружаем информацию...</p>
    </div>
</div>

<div id="footer"></div>

<script>

    function getCountryIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    function renderPage(country) {
        const heroSection = `
            <section class="country-hero">
                    <img class="country-hero-img" src="${country.path_url}" alt="${country.name}">
                <div class="country-hero-overlay">
                    <div>
                        <div class="country-hero-badge">
                            <i class="fas fa-star"></i> Популярность: ${country.popularity}
                        </div>
                        <div class="country-hero-title">${country.name}</div>
                    </div>
                </div>
            </section>
        `;

        const infoSection = `
            <section class="country-info-section">
                <div class="container">
                    <a href="countries.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Назад к странам
                    </a>
                    <br>
                    <h2 class="section-heading">О стране</h2>
                    <p class="mt-3"></p>
                    <div class="country-description-box mt-3">
                        ${country.description || 'Описание отсутствует.'}
                    </div>
                </div>
            </section>
        `;

        const citiesHtml = renderCities(country.cities);

        const citiesSection = `
            <section class="cities-section">
                <div class="container">
                    <h2 class="section-heading">Города и достопримечательности</h2>
                    <p class="text-muted mt-2 mb-4">Исследуйте лучшие места</p>
                    ${citiesHtml}
                </div>
            </section>
        `;

        document.getElementById('page-content').innerHTML = heroSection + infoSection + citiesSection;
    }

    function renderCities(cities) {
        if (!cities || cities.length === 0) {
            return `<p class="no-attractions">Города не добавлены.</p>`;
        }

        return cities.map(city => {
            const attractionsHtml = renderAttractions(city.attractions);
            return `
                <div class="city-block">
                    <div class="city-header">
                        <div class="city-icon"><i class="fas fa-city"></i></div>
                        <h3>${city.name}</h3>
                        <div class="city-popularity">
                            <i class="fas fa-fire"></i> ${city.popularity}
                        </div>
                    </div>
                    <div class="city-body">
                            <p class="city-description">${city.description}</p>
                        <div class="attractions-title">
                            <i class="fas fa-landmark"></i> Достопримечательности
                        </div>
                        ${attractionsHtml}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderAttractions(attractions) {
        if (!attractions || attractions.length === 0) {
            return `<p class="no-attractions">Достопримечательности не добавлены.</p>`;
        }

        return `<div class="attractions-grid">` + attractions.map(attr => {
            return `
                <div class="attraction-card">
                    <div class="attraction-img-wrap">
                        <img src="${attr.photo_url}" alt="${attr.name}">
                    </div>
                    <div class="attraction-body">
                        <div class="attraction-name">${attr.name}</div>
                        ${attr.description
                            ? `<div class="attraction-desc">${attr.description}</div>`
                            : ''
                        }
                        <div class="attraction-popularity">
                            <i class="fas fa-star"></i> ${attr.popularity}
                        </div>
                    </div>
                </div>
            `;
        }).join('') + `</div>`;
    }

    $(document).ready(function () {
        const countryId = getCountryIdFromUrl();

        if (!countryId) {
            document.getElementById('page-content').innerHTML = `
                <div class="error-box">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h4>Страна не найдена</h4>
                    <p>Не указан идентификатор страны.</p>
                    <a href="countries.html" class="btn mt-3"><i class="fas fa-arrow-left"></i> К списку стран</a>
                </div>`;
            return;
        }

        $.ajax({
            url: 'http://localhost:8087/api/countries/' + countryId,
            type: 'GET',
            success: function (country) {
                renderPage(country);
            },
            error: function (xhr) {
                const msg = xhr.status === 404 ? 'Страна не найдена.' : 'Ошибка загрузки данных.';
                document.getElementById('page-content').innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h4>${msg}</h4>
                        <a href="countries.html" class="btn mt-3"><i class="fas fa-arrow-left"></i> К списку стран</a>
                    </div>`;
            }
        });
    });
</script>
</body>
</html>
