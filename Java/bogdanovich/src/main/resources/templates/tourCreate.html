<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap"
          rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
    <link rel="icon" href="../static/img/logo.png">
    <script src="../static/js/js.js"></script>
</head>
<body>
<div id="header"></div>

<main>
    <div class="container">
        <div class="section-title">
            <h2>Собери тур сам</h2>
            <p class="text-muted" style="font-size: 1.2rem; margin-top: 15px;">Выбери город, отель, транспорт для своего идеального путешествия</p>
        </div>

        <ul class="nav nav-pills justify-content-center mb-5" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pills-paris-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-paris" type="button" role="tab"
                        aria-controls="pills-paris" aria-selected="true">
                    Общее планирование
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="pills-nice-tab" data-bs-toggle="pill"
                        data-bs-target="#pills-nice" type="button" role="tab"
                        aria-controls="pills-nice" aria-selected="false">
                    Полное почасовое планирование
                </button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="pills-paris" role="tabpanel" aria-labelledby="pills-paris-tab">

            </div>

            <div class="tab-pane fade" id="pills-nice" role="tabpanel" aria-labelledby="pills-nice-tab">

            </div>
        </div>
    </div>
</main>

<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
