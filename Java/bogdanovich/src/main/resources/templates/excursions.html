<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Экскурсии</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap"
          rel="stylesheet">
    <link href="/api/assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="/api/assets/img/logo.png">
    <script src="/api/assets/js/config.js"></script>
    <script src="/api/assets/js/app.js"></script>
    <script src="/api/assets/js/js.js"></script>
    <style>
        .page-hero {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #3d4f6e 100%);
            color: #fff;
            border-radius: 24px;
            padding: 28px 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }
        .page-hero::after {
            content: '';
            position: absolute;
            width: 420px;
            height: 420px;
            right: -160px;
            top: -160px;
            background: rgba(255, 107, 107, 0.22);
            border-radius: 50%;
        }
        .cardx {
            border: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: #fff;
        }
        .cardx:hover { transform: translateY(-4px); box-shadow: 0 18px 44px rgba(0,0,0,0.14); }
        .cardx img { width: 100%; height: 210px; object-fit: cover; display:block; }
        .cardx-body { padding: 14px 16px 16px; }
        .title { font-weight: 900; margin: 0 0 6px; }
        .meta { color:#6b7280; font-size:.92rem; }
        .desc { color:#6b7280; font-size:.92rem; line-height:1.5; margin-top:8px; }
        .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; background:rgba(255,107,107,.10); color:#b73a3a; font-weight:800; font-size:.85rem; }
    </style>
</head>
<body>
<div id="header"></div>

<div class="container mt-4">
    <div class="page-hero">
        <div style="position: relative; z-index: 1;">
            <div style="font-size:2rem;font-weight:800;margin:0;">Экскурсии</div>
            <div style="opacity:.85;margin-top:6px;">Выберите экскурсию в любимом городе</div>
        </div>
    </div>

    <div class="row g-4 mt-2" id="list"></div>
    <div class="text-muted mt-3" id="empty" style="display:none;">Нет данных.</div>
</div>

<div id="footer"></div>

<script>
    $(document).ready(function () {
        $.ajax({
            url: API_BASE + '/excursions',
            type: 'GET',
            success: function (items) {
                const list = $('#list');
                list.empty();
                if (!items || items.length === 0) {
                    $('#empty').show();
                    return;
                }
                items.forEach(e => {
                    const img = normalizeImage(e.photoUrl);
                    const col = $(`
                        <div class="col-12 col-md-6 col-lg-4">
                            <div class="cardx h-100">
                                <img src="${img}" alt="${e.name}">
                                <div class="cardx-body">
                                    <p class="title">${e.name}</p>
                                    <div class="meta"><i class="fas fa-map-marker-alt me-2"></i>${e.cityName || ''}</div>
                                    <div class="meta mt-1"><i class="fas fa-clock me-2"></i>${e.durationHours || '—'} ч</div>
                                    <div class="desc">${(e.description || '').toString().slice(0, 110)}${(e.description && e.description.length>110)?'...':''}</div>
                                    <div class="mt-3 d-flex align-items-center justify-content-between">
                                        <span class="pill"><i class="fas fa-tag"></i>${e.price != null ? (e.price + ' €') : '—'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `);
                    list.append(col);
                });
            },
            error: function () {
                $('#empty').text('Не удалось загрузить экскурсии.').show();
            }
        });
    });
</script>
</body>
</html>
