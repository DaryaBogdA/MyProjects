<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap"
          rel="stylesheet">
    <link href="/api/assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="/api/assets/img/logo.png">
    <script src="/api/assets/js/config.js"></script>
    <script src="/api/assets/js/app.js"></script>
    <script src="/api/assets/js/js.js"></script>
    <style>
        .cabinet-hero {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #3d4f6e 100%);
            color: #fff;
            border-radius: 24px;
            padding: 28px 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .cabinet-hero::after {
            content: '';
            position: absolute;
            width: 420px;
            height: 420px;
            right: -160px;
            top: -160px;
            background: rgba(255, 107, 107, 0.22);
            border-radius: 50%;
        }

        .cabinet-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
        }

        .cabinet-subtitle {
            opacity: 0.85;
            margin-top: 6px;
        }

        .card-soft {
            border: 0;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .card-soft .card-header {
            border: 0;
            background: transparent;
            padding: 18px 22px 0;
        }

        .card-soft .card-body {
            padding: 22px;
        }

        .section-label {
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label i {
            color: var(--coral);
        }

        .trip-item {
            border: 1px solid #eef2f6;
            border-radius: 16px;
            padding: 14px 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: #fff;
        }

        .trip-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
        }

        .trip-title {
            font-weight: 800;
            margin-bottom: 6px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 107, 107, 0.10);
            color: #b73a3a;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .muted {
            color: #6b7280;
        }

        .icon-btn {
            border: 0;
            background: rgba(0,0,0,0.04);
            color: var(--dark-text);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 107, 107, 0.12);
            transform: translateY(-1px);
        }

    </style>
</head>
<body>
<div id="header"></div>

<div class="container mt-4">
    <div class="cabinet-hero">
        <div style="position: relative; z-index: 1;">
            <div class="cabinet-title">Личный кабинет</div>
            <div class="cabinet-subtitle">Профиль пользователя — туры и бронирования в меню сверху</div>
        </div>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-12 col-lg-8 mx-auto">
            <div class="card card-soft">
                <div class="card-header">
                    <div class="section-label"><i class="fas fa-user"></i>Мои данные</div>
                </div>
                <div class="card-body">
                    <div id="profileAlert" class="alert" style="display:none;"></div>

                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" disabled>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Имя</label>
                                <input type="text" class="form-control" id="firstName" placeholder="Иван">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Фамилия</label>
                                <input type="text" class="form-control" id="lastName" placeholder="Иванов">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Отчество</label>
                                <input type="text" class="form-control" id="surName" placeholder="Иванович">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Дата рождения</label>
                                <input type="date" class="form-control" id="birthDate">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Телефон</label>
                                <input type="text" class="form-control" id="phone" placeholder="+375XXXXXXXXX">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Паспорт</label>
                                <input type="text" class="form-control" id="passportNumber" placeholder="Серия и номер">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Дата выдачи паспорта</label>
                                <input type="date" class="form-control" id="passportDate">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Предпочтения</label>
                            <textarea class="form-control" id="preferences" rows="3"
                                      placeholder="Например: люблю экскурсии, без пересадок, 4* отели"></textarea>
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" value="" id="notificationEmail" checked>
                            <label class="form-check-label" for="notificationEmail">
                                Получать уведомления на email
                            </label>
                        </div>

                        <button class="btn" type="submit"><i class="fas fa-save"></i>Сохранить</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="footer"></div>

<script>
    const API_BASE = window.API_BASE || 'http://localhost:8087/api';

    function authHeaders() {
        const token = localStorage.getItem('token');
        return token ? { 'Authorization': 'Bearer ' + token } : {};
    }

    function showAlert(type, text) {
        const el = $('#profileAlert');
        el.removeClass('alert-success alert-danger alert-warning').addClass('alert-' + type);
        el.text(text).show();
        setTimeout(() => el.fadeOut(), 3500);
    }

    function requireAuthOrRedirect() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
            return false;
        }
        return true;
    }

    function normalizeBYPhone(raw) {
        if (!raw) return '';
        return raw.replace(/[^\d+]/g, '').replace(/^00/, '+');
    }

    function isValidBYPhone(raw) {
        const v = normalizeBYPhone(raw);
        return v === '' || /^\+375\d{9}$/.test(v);
    }

    function fillProfileForm(profile) {
        $('#email').val(profile.email || '');
        $('#firstName').val(profile.firstName || '');
        $('#lastName').val(profile.lastName || '');
        $('#surName').val(profile.surName || '');
        $('#birthDate').val(profile.birthDate || '');
        $('#passportNumber').val(profile.passportNumber || '');
        $('#passportDate').val(profile.passportDate || '');
        $('#phone').val(profile.phone || '');
        $('#preferences').val(profile.preferences || '');
        $('#notificationEmail').prop('checked', profile.notificationEmail !== false);
    }


    async function loadProfile() {
        try {
            const profile = await $.ajax({
                url: API_BASE + '/profile/me',
                method: 'GET',
                headers: authHeaders()
            });
            fillProfileForm(profile);
        } catch (e) {
            showAlert('danger', 'Не удалось загрузить профиль');
        }
    }

    $('#profileForm').on('submit', async function (e) {
        e.preventDefault();

        const phoneVal = $('#phone').val();
        if (!isValidBYPhone(phoneVal)) {
            showAlert('danger', 'Телефон должен быть в формате Беларуси: +375XXXXXXXXX');
            return;
        }

        const payload = {
            firstName: $('#firstName').val(),
            lastName: $('#lastName').val(),
            surName: $('#surName').val(),
            birthDate: $('#birthDate').val() || null,
            passportNumber: $('#passportNumber').val(),
            passportDate: $('#passportDate').val() || null,
            phone: normalizeBYPhone(phoneVal) || null,
            preferences: $('#preferences').val(),
            notificationEmail: $('#notificationEmail').is(':checked')
        };

        try {
            await $.ajax({
                url: API_BASE + '/profile/me',
                method: 'PUT',
                contentType: 'application/json',
                headers: authHeaders(),
                data: JSON.stringify(payload)
            });
            showAlert('success', 'Профиль сохранён');
        } catch (e) {
            let msg = 'Не удалось сохранить профиль';
            if (e.responseJSON && e.responseJSON.message) {
                msg = e.responseJSON.message;
            } else if (e.responseJSON && e.responseJSON.error) {
                msg = e.responseJSON.error;
            } else if (e.status === 400) {
                msg = 'Неверный формат телефона. Ожидается +375XXXXXXXXX';
            }
            showAlert('danger', msg);
        }
    });

    $(document).ready(function () {
        if (!requireAuthOrRedirect()) return;
        loadProfile();
    });
</script>
</body>
</html>
