<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Заявка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="/api/assets/css/style.css" rel="stylesheet">
    <script src="/api/assets/js/config.js"></script>
    <script src="/api/assets/js/app.js"></script>
    <script src="/api/assets/js/js.js"></script>
</head>
<body>
<div id="header"></div>
<div class="container mt-4 mb-5" id="content">Загрузка...</div>
<div id="footer"></div>
<script>
    const bid = new URLSearchParams(location.search).get('id');
    function adminHeaders() { return authHeaders(); }

    function render(b) {
        const st = b.status || 'PENDING';
        let html = `<a href="admin.html"><i class="fas fa-arrow-left"></i> К заявкам</a>
            <h1 class="fw-bold mt-3">Заявка #${b.id}</h1>
            <p><span class="badge bg-secondary">${statusLabel(st)}</span> · <strong>${b.totalPrice || '—'} €</strong></p>
            <p class="text-muted">Пользователь: <strong>${b.userEmail || '—'}</strong></p>`;
        if (b.kind === 'TOUR') {
            html += `<div class="card border-0 shadow-sm p-4 mt-3">
                <h4>${b.tourName || 'Тур'}</h4>
                <p>${b.tourDescription || ''}</p>
                <p class="text-muted">${b.countryName || ''} ${b.cityName || ''}</p>
                ${b.tourPhotoUrl ? '<img class="img-fluid rounded mt-2" style="max-height:280px;object-fit:cover" src="'+normalizeImage(b.tourPhotoUrl)+'">' : ''}
            </div>`;
        } else {
            html += `<div class="card border-0 shadow-sm p-4 mt-3">
                <h4>${b.tripTitle || 'Собственный тур'}</h4>
                <p>${b.dateFrom || '—'} → ${b.dateTo || '—'} · ${b.peopleCount || '—'} чел.</p>
                <p class="text-muted">${b.countryName || ''} ${b.cityName || ''}</p>
                <ul>${(b.tripItems || []).map(i => '<li>'+i+'</li>').join('')}</ul>
            </div>`;
        }
        if (st === 'PENDING') {
            html += `<div class="d-flex gap-2 mt-4">
                <button class="btn" id="approveBtn">Одобрить</button>
                <button class="btn btn-outline-danger" id="rejectBtn">Отклонить</button>
            </div>`;
        }
        $('#content').html(html);
        $('#approveBtn').on('click', async () => {
            await $.ajax({ url: API_BASE + '/admin/bookings/' + b.id + '/approve', method: 'POST', headers: adminHeaders() });
            location.href = 'admin.html';
        });
        $('#rejectBtn').on('click', async () => {
            if (!confirm('Отклонить заявку?')) return;
            await $.ajax({ url: API_BASE + '/admin/bookings/' + b.id + '/reject', method: 'POST', headers: adminHeaders() });
            location.href = 'admin.html';
        });
    }

    $(document).ready(async function () {
        if (!requireAuth()) return;
        const u = await loadCurrentUser();
        if (!u || u.role !== 'ADMIN') {
            $('#content').html('<p class="text-danger">Доступ только для администратора</p>');
            return;
        }
        if (!bid) { $('#content').html('<p class="text-danger">Заявка не указана</p>'); return; }
        $.ajax({ url: API_BASE + '/admin/bookings/' + bid, headers: adminHeaders() })
            .done(render)
            .fail(() => $('#content').html('<p class="text-danger">Заявка не найдена</p>'));
    });
</script>
</body>
</html>
