<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas - Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap"
          rel="stylesheet">
    <link href="../static/css/style.css" rel="stylesheet">
    <link rel="icon" href="../static/img/logo.png">
    <script src="../static/js/js.js"></script>

</head>
<body>
<div id="header"></div>

<section class="registration-section">
    <div class="container">
        <div class="registration-container">
            <div class="registration-header">
                <h2>Создать аккаунт</h2>
                <p>Присоединяйтесь к нашему сообществу путешественников</p>
            </div>

            <form class="registration-form" id="registerForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>Email
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>Пароль
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Минимум 8 символов"
                               minlength="8" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">
                        Я согласен с <a href="#">условиями использования</a> и
                        <a href="#">политикой конфиденциальности</a>
                    </label>
                </div>

                <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                <button type="submit" class="btn">
                    <i class="fas fa-user-plus"></i>Зарегистрироваться
                </button>

                <div class="divider">
                    <span>или</span>
                </div>

                <div class="social-register">
                    <button type="button" class="social-btn">
                        <i class="fab fa-google"></i>Google
                    </button>
                </div>

                <div class="login-link">
                    <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                </div>
            </form>
        </div>
    </div>
</section>

<div id="footer"></div>
<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const button = field.nextElementSibling;
        const icon = button.querySelector('i');

        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    $('#registerForm').on('submit', function (e) {
        e.preventDefault();

        const email = $('#email').val();
        const password = $('#password').val();

        if (!email || !password) {
            $('#errorMessage').text('Заполните все поля').show();
            return;
        }

        $.ajax({
            url: 'http://localhost:8087/api/auth/register',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({email, password}),
            success: function (response) {
                sessionStorage.setItem('registrationMessage', response.message);
                window.location.href = 'login.html';
            },
            error: function (xhr) {
                let errorMsg = 'Ошибка регистрации';
                if (xhr.responseJSON) {
                    errorMsg = xhr.responseJSON.message || xhr.responseJSON.error || errorMsg;
                }
                $('#errorMessage').text(errorMsg).show();
            }
        });
    });
</script>
</body>
</html>
