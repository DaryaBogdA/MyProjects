<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas — Выбрать тур</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link href="/api/assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="/api/assets/img/logo.png">
    <script src="/api/assets/js/config.js"></script>
    <script src="/api/assets/js/app.js"></script>
    <script src="/api/assets/js/js.js"></script>
    <style>
        .page-hero { background: linear-gradient(135deg, var(--dark-bg) 0%, #3d4f6e 100%); color: #fff; border-radius: 24px; padding: 28px; margin-bottom: 1.5rem; }
        .page-title { font-size: 2rem; font-weight: 800; margin: 0; }
        .tour-card { border: 0; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.08); overflow: hidden; height: 100%; background: #fff; }
        .tour-card img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .tour-name { font-weight: 800; margin: 0; }
        .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: rgba(255,107,107,.1); color: #b73a3a; font-weight: 700; font-size: .85rem; }
    </style>
</head>
<body>
<div id="header"></div>
<div class="container mt-4 mb-5">
    <div class="page-hero">
        <div class="page-title">Выбрать тур</div>
        <p class="mb-0 mt-2 opacity-75">Готовые маршруты с экскурсиями — откройте карточку для подробностей</p>
    </div>
    <div class="row g-4" id="toursList"></div>
    <p class="text-muted" id="toursEmpty" style="display:none;">Пока нет опубликованных туров.</p>
</div>
<div id="footer"></div>
<script>
    function renderTours(tours) {
        const list = $('#toursList');
        list.empty();
        if (!tours || !tours.length) { $('#toursEmpty').show(); return; }
        $('#toursEmpty').hide();
        tours.forEach(t => {
            const img = normalizeImage(t.photoUrl);
            const title = t.name || ('Тур #' + t.id);
            list.append(`
                <div class="col-12 col-md-6 col-lg-4">
                    <article class="tour-card">
                        <a href="tourDetail.html?id=${t.id}"><img src="${img}" alt="${title}" onerror="this.src='/api/assets/img/countries/italy.jpg'"></a>
                        <div class="p-3">
                            <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                                <p class="tour-name">${title}</p>
                                <span class="pill"><i class="fas fa-fire"></i>${t.popularity || 0}</span>
                            </div>
                            <p class="text-muted small">${t.durationDays || '—'} дн. · ${t.priceTotal != null ? t.priceTotal + ' €' : '—'}</p>
                            <p class="text-muted small" style="min-height:40px">${(t.description || '').slice(0, 90)}${(t.description && t.description.length > 90) ? '…' : ''}</p>
                            <a href="tourDetail.html?id=${t.id}" class="btn btn-sm w-100 mb-2">Подробнее</a>
                        </div>
                    </article>
                </div>`);
        });
    }
    $(document).ready(function () {
        setMinDateToday('#globalTravelDate');
        $('#toursList').on('click', '[data-action="book-tour"]', async function (e) {
            e.preventDefault();
            if (!requireAuth()) return;
            const id = $(this).data('id');
            const card = $(this).closest('.p-3');
            let travelDate = card.find('.tour-travel-date').val() || $('#globalTravelDate').val();
            if (!travelDate) { alert('Укажите дату начала поездки'); return; }
            if (travelDate < todayIso()) { alert('Нельзя бронировать тур в прошлом'); return; }
            try {
                await $.ajax({
                    url: API_BASE + '/bookings/tours/' + id,
                    method: 'POST',
                    contentType: 'application/json',
                    headers: authHeaders(),
                    data: JSON.stringify({ travelDate })
                });
                alert('Заявка отправлена! Ожидайте подтверждения администратора.');
                window.location.href = 'myBookings.html';
            } catch (err) {
                const msg = err.responseJSON?.message || (err.status === 401 || err.status === 403 ? 'Войдите в аккаунт' : 'Не удалось отправить заявку');
                alert(msg);
            }
        });
        $.get(API_BASE + '/tours').done(function (tours) {
            renderTours(tours);
            setMinDateToday('.tour-travel-date');
        }).fail(() => $('#toursEmpty').text('Не удалось загрузить туры.').show());
    });
</script>
</body>
</html>
