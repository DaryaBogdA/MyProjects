<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelCanvas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Condensed:wght@700&display=swap"
          rel="stylesheet">
    <link href="/api/assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="/api/assets/img/logo.png">
    <script src="/api/assets/js/config.js"></script>
    <script src="/api/assets/js/app.js"></script>
    <script src="/api/assets/js/js.js"></script>

</head>
<body>
<div id="header"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <h2 class="m-0">Список стран</h2>
        <div class="d-flex gap-2 align-items-center">
            <label class="text-muted small">Сортировать:</label>
            <select id="sortCountries" class="form-select form-select-sm w-auto">
                <option value="popularity-desc">По популярности (сначала лучшие)</option>
                <option value="name-asc">По названию (А–Я)</option>
                <option value="name-desc">По названию (Я–А)</option>
            </select>
        </div>
    </div>
    <div id="countriesContainer" class="row row-cols-1 row-cols-md-3 g-4"></div>
</div>

<div id="footer"></div>

<script>
    $(document).ready(function () {
        let allCountries = [];

        function renderCountries(sortedList) {
            const container = $('#countriesContainer');
            container.empty();
            if (!sortedList || sortedList.length === 0) {
                container.html('<p class="text-muted">Нет доступных стран</p>');
                return;
            }
            sortedList.forEach(function (country) {
                const col = $('<div class="col"></div>');
                const card = $(`
            <a href="countryMore.html?id=${country.id}" class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden text-decoration-none text-dark"
               style="transition: transform 0.3s, box-shadow 0.3s;"
               onmouseover="this.style.transform='translateY(-6px)';this.style.boxShadow='0 16px 40px rgba(0,0,0,0.15)'"
               onmouseout="this.style.transform='';this.style.boxShadow=''">
                <img src="${normalizeImage(country.path_url)}" class="card-img-top" alt="${country.name}" style="height: 200px; object-fit: cover;" onerror="this.src='https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=800&q=80'">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold mb-2">${country.name}</h5>
                    <p class="card-text description small text-secondary-emphasis mb-3">${country.description || ''}</p>
                    <div class="mt-auto">
                        <span class="badge bg-primary bg-opacity-75 px-3 py-2 rounded-pill">
                            <i class="fas fa-star me-1"></i> Популярность: ${country.popularity}
                        </span>
                    </div>
                </div>
            </a>
        `);
                col.append(card);
                container.append(col);
            });
        }

        function sortCountries() {
            const sortBy = $('#sortCountries').val();
            let sorted = [...allCountries];
            if (sortBy === 'popularity-desc') {
                sorted.sort((a, b) => b.popularity - a.popularity);
            } else if (sortBy === 'name-asc') {
                sorted.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'name-desc') {
                sorted.sort((a, b) => b.name.localeCompare(a.name));
            }
            renderCountries(sorted);
        }

        $(document).ready(function () {
            $.ajax({
                url: API_BASE + '/countries?page=0&size=100',
                type: 'GET',
                success: function (response) {
                    allCountries = response.content || response;
                    sortCountries();
                },
                error: function () {
                    $('#countriesContainer').html('<p class="text-danger">Не удалось загрузить список стран.</p>');
                }
            });
            $('#sortCountries').on('change', sortCountries);
        });
    });
</script>
</body>
</html>
