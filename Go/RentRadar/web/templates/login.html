<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRadar - Вход и регистрация</title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-page">
    
    <header class="header auth-header">
        <div class="container header-container">
                <a href="/index.html" class="logo-link">
                <div class="logo">
                    <span class="logo-icon"><i class="fas fa-search-location"></i></span>
                    <span class="logo-text">RentRadar</span>
                </div>
            </a>
               
        <nav class="main-nav">
            <ul>
                <li><a href="#">Аренда</a></li>
                <li><a href="#">Продажа</a></li>
                <li><a href="#">Новости</a></li>
                <li><a href="#">О нас</a></li>
            </ul>
        </nav>
            <div class="user-actions">
                <a href="/index.html" class="btn btn-outline">
                    <i class="fas fa-arrow-left"></i> На главную
                </a>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Вход</button>
                <button class="auth-tab" id="registerTab">Регистрация</button>
            </div>

            
            <div class="auth-form active" id="loginForm">
                <h2 class="auth-title">Вход</h2>

                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginIdentifier">Номер телефона / Email</label>
                        <div class="input-field">
                            <input type="text" id="loginIdentifier" placeholder="+375 (29) 123-45-67 или example@mail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
            <label for="loginPassword">Пароль</label>
            <div class="input-field">
            <input type="password" id="loginPassword" placeholder="Введите пароль" required> 
            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
            <i class="far fa-eye-slash"></i> 
        </button>
    </div>
</div>


                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" checked>
                            <span class="checkmark"></span>
                            Запомнить меня
                        </label>
                        <a href="#" class="forgot-password">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Войти</button>
                </form>

                <p class="auth-switch">
                    Ещё нет аккаунта? 
                    <a href="#" id="switchToRegister">Зарегистрироваться</a>
                </p>
            </div>

           
<div class="auth-form" id="registerForm">
    <h2 class="auth-title">Регистрация</h2>

    <form id="registerFormElement">
        <div class="form-row">
            <div class="form-group half">
                <label for="registerFirstName">Имя</label>
                <div class="input-field">
                    <input type="text" id="registerFirstName" placeholder="Иван" required>
                </div>
            </div>
            <div class="form-group half">
                <label for="registerLastName">Фамилия</label>
                <div class="input-field">
                    <input type="text" id="registerLastName" placeholder="Петров" required>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="registerIdentifier">Номер телефона / Email</label>
            <div class="input-field">
                <input type="text" id="registerIdentifier" placeholder="+375 (29) 123-45-67 или example@mail.com" required>
            </div>
        </div>

        
        <div class="form-group">
            <label for="registerPassword">Пароль</label>
            <div class="input-field">
                <input type="password" id="registerPassword" placeholder="Создайте пароль" required>
                <button type="button" class="toggle-password" onclick="togglePassword('registerPassword', this)">
                    <i class="far fa-eye-slash"></i> 
                </button>
            </div>
            
            <div class="password-strength-minimal" id="passwordStrength"></div>
        </div>

        
        <div class="form-group">
            <label for="registerConfirmPassword">Подтверждение пароля</label>
            <div class="input-field">
                <input type="password" id="registerConfirmPassword" placeholder="Повторите пароль" required>
                <button type="button" class="toggle-password" onclick="togglePassword('registerConfirmPassword', this)">
                    <i class="far fa-eye-slash"></i> 
                </button>
            </div>
            
            <div class="password-match-minimal" id="passwordMatch"></div>
        </div>

        <div class="form-group terms">
            <label class="checkbox-container">
                <input type="checkbox" required>
                <span class="checkmark"></span>
                Я соглашаюсь с <a href="#">условиями использования</a>
            </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
    </form>

    <p class="auth-switch">
        Уже есть аккаунт? 
        <a href="#" id="switchToLogin">Войти</a>
    </p>
</div>

    
    <footer class="auth-footer">
        <div class="container">
            <p>&copy; 2026 RentRadar. Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/script.js?v=3"></script>
</body>
</html>
