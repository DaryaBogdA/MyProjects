<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRadar — Мои отзывы</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/reviews.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="/index.html" class="logo-link">
                <div class="logo">
                    <span class="logo-icon"><i class="fas fa-search-location"></i></span>
                    <span class="logo-text">RentRadar</span>
                </div>
            </a>
            <nav class="main-nav">
                <ul>
                    <li><a href="/index.html">Аренда</a></li>
                    <li><a href="/sale.html">Продажа</a></li>
                    <li><a href="/news.html">Новости</a></li>
                    <li><a href="/about.html">О нас</a></li>
                </ul>
            </nav>
            <div class="user-actions"></div>
        </div>
    </header>

    <main>
        <div class="reviews-page">
            <div class="page-header">
                <h1><i class="fas fa-star"></i> Мои отзывы</h1>
                <div class="reviews-stats" id="reviewsStats">
                    <div class="stat-card">
                        <div class="stat-number" id="statWritten">—</div>
                        <div class="stat-label">Я написал</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statAbout">—</div>
                        <div class="stat-label">О моих объявлениях</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statAvg">—</div>
                        <div class="stat-label">Средняя оценка (мои объявления)</div>
                    </div>
                </div>
            </div>

            <div class="reviews-tabs">
                <button type="button" class="reviews-tab active" data-tab="written">
                    <i class="fas fa-pen"></i> Я оставил
                </button>
                <button type="button" class="reviews-tab" data-tab="about">
                    <i class="fas fa-home"></i> О моих объявлениях
                </button>
            </div>

            <div class="reviews-container" id="reviewsContainer">
                <p style="color:var(--text-muted);">Загрузка…</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 RentRadar. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="/static/js/script.js"></script>
    <script src="/static/js/reviews.js"></script>
</body>
</html>
