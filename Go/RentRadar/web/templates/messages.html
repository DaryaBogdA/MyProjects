<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRadar - Сообщения</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .chat-message-mine {
            background: var(--primary-teal);
            color: white;
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px;
        }
        .chat-message-other {
            background: #f3f4f6;
            color: var(--text-dark);
            border-radius: 18px 18px 18px 4px;
            padding: 10px 14px;
        }
        #messageInput:focus {
            border-color: var(--primary-teal) !important;
            box-shadow: 0 0 0 2px rgba(44, 120, 115, 0.1);
        }
        #sendMessageBtn {
            transition: all 0.2s;
        }
        #sendMessageBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
<header class="header">
    <div class="container header-container"></div>
</header>


<main class="container" style="padding:24px 0 40px;">
    <h1 style="margin-bottom:14px;">Переписка</h1>
    <div style="display:grid; grid-template-columns:320px 1fr; gap:16px;">
        <aside style="border:1px solid var(--border-color); border-radius:12px; overflow:hidden; background:white;">
            <div style="padding:10px 12px; border-bottom:1px solid var(--border-color); font-weight:600;">Диалоги</div>
            <div id="convList"></div>
        </aside>
        <section style="border:1px solid var(--border-color); border-radius:12px; background:white; display:flex; flex-direction:column; min-height:520px;">
            <div id="chatHeader" style="padding:10px 12px; border-bottom:1px solid var(--border-color); font-weight:600;">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;width:100%;">
                    <span id="chatHeaderTitle">Выберите диалог</span>
                    <button type="button" id="deleteConvBtn" class="btn btn-outline btn-sm" style="display:none;flex-shrink:0;">Удалить диалог</button>
                </div>
            </div>
            <div id="chatMessages" style="padding:12px; flex:1; overflow:auto;"></div>
        </section>
    </div>
</main>


<footer class="footer"></footer>
<script src="/static/js/components.js"></script>

<script src="/static/js/script.js"></script>
<script src="/static/js/messages.js"></script>
</body>
</html>
