<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRadar - Личный кабинет</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .profile-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .profile-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .profile-tab i {
            margin-right: 8px;
        }

        .profile-tab:hover {
            color: var(--primary-teal);
            background: #f5f5f5;
        }

        .profile-tab.active {
            color: var(--primary-teal);
            background: #e8f3f2;
        }

        .profile-tab-content {
            display: none;
        }

        .profile-tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .favorite-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .favorite-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .favorite-image {
            height: 160px;
            overflow: hidden;
        }

        .favorite-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .favorite-content {
            padding: 15px;
        }

        .favorite-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .favorite-price {
            color: var(--primary-teal);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .favorite-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }


        .my-listings-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .my-listing-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: row;
        }

        .my-listing-image {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }


        .my-listing-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .my-listing-content {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .my-listing-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .my-listing-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .listing-details {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .listing-details i {
            color: var(--primary-light);
            margin-right: 4px;
        }

        .listing-status-row { margin-top: 8px; }
        .listing-status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .listing-status-badge.pending { background: #fff4e6; color: #b45309; }
        .listing-status-badge.approved { background: #e8f3f2; color: #2c7873; }
        .listing-status-badge.rejected { background: #fee2e2; color: #b91c1c; }
        .listing-status-badge.removed { background: #f3f4f6; color: #6b7280; }


        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-teal);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<header class="header">
    <div class="container header-container"></div>
</header>


<main>
    <div class="container">
        <div class="profile-nav">
            <h1 class="page-title">Личный кабинет</h1>
        </div>

        
        <div class="profile-tabs">
            <button class="profile-tab active" data-tab="profile">
                <i class="fas fa-user"></i> Мой профиль
            </button>
            <button class="profile-tab" data-tab="favorites">
                <i class="fas fa-heart"></i> Избранное
            </button>
            <button class="profile-tab" data-tab="my-listings">
                <i class="fas fa-list"></i> Мои объявления
            </button>
        </div>

        
        <div class="profile-tab-content active" id="profile-tab">
            <div class="settings-container">
                
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-number" id="statsListings">0</div>
                        <div class="stat-label">Мои объявления</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statsFavorites">0</div>
                        <div class="stat-label">В избранном</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statsViews">0</div>
                        <div class="stat-label">Всего просмотров</div>
                    </div>
                </div>

                
                <div class="settings-section">
                    <h2> Личные данные</h2><br>
                    <form id="profileForm">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" id="profileFirstName" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Фамилия</label>
                            <input type="text" id="profileLastName" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmail" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Телефон</label>
                            <input type="tel" id="profilePhone" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                        <p id="profileSaveMessage" style="margin-top:10px;color:var(--text-muted);"></p>
                    </form>
                </div>

                
                <div class="settings-section">
                    <h2>Смена пароля</h2><br>
                    <form id="passwordForm">
                        <div class="form-group">
                            <div class="input-field">
                                <input type="password" id="currentPassword" placeholder="Текущий пароль">
                                <button type="button" class="toggle-password" onclick="togglePassword('currentPassword', this)">
                                    <i class="far fa-eye-slash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-field">
                                <input type="password" id="newPassword" placeholder="Новый пароль">
                                <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">
                                    <i class="far fa-eye-slash"></i>
                                </button>
                            </div>
                            <div class="password-strength-minimal" id="passwordStrength"></div>
                        </div>
                        <div class="form-group">
                            <div class="input-field">
                                <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
                                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                                    <i class="far fa-eye-slash"></i>
                                </button>
                            </div>
                            <div class="password-match-minimal" id="passwordMatch"></div>
                        </div>
                        <button type="submit" class="btn btn-primary">Сменить пароль</button>
                    </form>
                </div>
            </div>
        </div>


        <div class="profile-tab-content" id="favorites-tab">
            <div class="favorites-grid" id="favoritesGrid" style="display: flex; justify-content: center; align-items: center; min-height: 400px;">
            </div>
        </div>

        
        <div class="profile-tab-content" id="my-listings-tab">
            <div class="my-listings-grid" id="myListingsGrid">
                
            </div>
        </div>
    </div>
</main>


<footer class="footer"></footer>
<script src="/static/js/components.js"></script>


<script src="/static/js/script.js?v=4"></script>
<script src="/static/js/profile.js?v=4"></script>
</body>
</html>
