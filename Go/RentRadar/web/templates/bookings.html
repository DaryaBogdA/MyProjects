<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRadar - Бронирования</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .bookings-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .bookings-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bookings-tab i {
            font-size: 1.1rem;
        }

        .bookings-tab:hover {
            color: var(--primary-teal);
            background: #f5f5f5;
        }

        .bookings-tab.active {
            color: var(--primary-teal);
            background: #e8f3f2;
        }

        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .booking-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .booking-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .booking-image {
            height: 180px;
            overflow: hidden;
            position: relative;
        }

        .booking-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .booking-card:hover .booking-image img {
            transform: scale(1.05);
        }

        .booking-status {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .booking-status i {
            font-size: 0.7rem;
        }

        .booking-status.pending {
            background: #ff9800;
        }

        .booking-status.approved {
            background: #4caf50;
        }

        .booking-status.rejected {
            background: #f44336;
        }

        .booking-status.cancelled {
            background: #9e9e9e;
        }

        .booking-content {
            padding: 18px;
        }

        .booking-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .booking-title a {
            color: var(--text-dark);
            text-decoration: none;
            transition: color 0.2s;
        }

        .booking-title a:hover {
            color: var(--primary-teal);
        }

        .booking-dates {
            background: #f8fafd;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .booking-date-item {
            text-align: center;
            flex: 1;
        }

        .booking-date-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .booking-date-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .booking-date-arrow {
            color: var(--primary-teal);
            font-size: 0.9rem;
        }

        .booking-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .booking-guest, .booking-price {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .booking-guest i, .booking-price i {
            color: var(--primary-light);
            width: 20px;
        }

        .booking-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-booking {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-booking-primary {
            background: var(--primary-teal);
            color: white;
        }

        .btn-booking-primary:hover {
            background: var(--primary-medium);
            transform: translateY(-2px);
        }

        .btn-booking-outline {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-dark);
        }

        .btn-booking-outline:hover {
            border-color: var(--primary-teal);
            color: var(--primary-teal);
        }

        .btn-booking-danger {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .btn-booking-danger:hover {
            background: #fecaca;
            transform: translateY(-2px);
        }

        .bookings-empty {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            border: 1px dashed var(--border-color);
            max-width: 500px;
            margin: 40px auto;
        }
        .count-badge {
            display: inline-block;
            background: var(--primary-teal);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            min-width: 22px;
            text-align: center;
        }
        .bookings-empty i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: inline-block;
        }

        .bookings-empty h3 {
            font-size: 1.3rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .bookings-empty p {
            color: var(--text-muted);
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
<header class="header">
    <div class="container header-container"></div>
</header>

<main>
    <div class="container">
        <div class="page-header" style="margin-bottom: 30px;">
            <h1 class="page-title">
                <i class="fas fa-calendar-check"></i> Бронирования
            </h1>
            <p class="page-subtitle">Управляйте своими заявками на аренду</p>
        </div>

        <div class="bookings-tabs">
            <button class="bookings-tab active" id="tabMyBtn">
                <i class="fas fa-calendar-alt"></i> Мои заявки
                <span id="myCountBadge" class="count-badge" style="display: none;">0</span>
            </button>
            <button class="bookings-tab" id="tabIncomingBtn">
                <i class="fas fa-envelope-open-text"></i> Заявки на мои объявления
                <span id="incomingCountBadge" class="count-badge" style="display: none;">0</span>
            </button>
        </div>

        <section id="bookingsRoot" class="bookings-grid"></section>
    </div>
</main>

<footer class="footer"></footer>

<script src="/static/js/components.js"></script>
<script src="/static/js/script.js"></script>
<script src="/static/js/bookings.js"></script>
</body>
</html>
